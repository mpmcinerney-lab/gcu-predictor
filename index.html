<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#111827;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:40px}

header{background:linear-gradient(135deg,#1e3a5f,#2d5a8e);color:#fff;padding:18px 16px 14px;text-align:center}
header h1{font-size:22px;font-weight:800;letter-spacing:.5px}
header .sub{font-size:13px;opacity:.85;margin-top:2px}

.panel{background:#fff;border-bottom:1px solid #e5e7eb}
.panel summary{padding:12px 16px;font-weight:600;font-size:14px;cursor:pointer;color:#374151;list-style:none;user-select:none}
.panel summary::-webkit-details-marker{display:none}
.panel summary::before{content:'\25B8 '}
.panel[open] summary::before{content:'\25BE '}
.panel-body{padding:0 16px 14px}

.field-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.field-row label{font-size:13px;font-weight:600;color:#374151;min-width:90px;flex-shrink:0}

.btn-group{display:flex;gap:0}
.btn-group button{padding:6px 12px;border:1.5px solid #d1d5db;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#374151;transition:all .15s}
.btn-group button:first-child{border-radius:6px 0 0 6px}
.btn-group button:last-child{border-radius:0 6px 6px 0}
.btn-group button:not(:first-child){border-left:none}
.btn-group button.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}

.time-h,.time-m{width:48px;height:44px;border:2px solid #d1d5db;border-radius:8px;text-align:center;font-size:18px;font-weight:600;color:#111827;background:#fff}
.time-h:focus,.time-m:focus,.hr-input:focus{border-color:#2563eb;outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.colon{font-size:20px;font-weight:700;color:#6b7280}
.hr-input{width:68px;height:38px;border:2px solid #d1d5db;border-radius:8px;text-align:center;font-size:15px;color:#111827;background:#fff}
.temp-btn{width:36px;height:36px;border:1.5px solid #d1d5db;border-radius:8px;background:#fff;font-size:18px;font-weight:600;cursor:pointer;color:#374151}
#temp-val{font-size:16px;font-weight:600;min-width:48px;text-align:center}

.elevation-wrap{background:#fff;padding:8px 0 0;border-bottom:1px solid #e5e7eb}
#el-svg{width:100%;height:100px;display:block}

.progress-section{padding:10px 16px;background:#fff;border-bottom:1px solid #e5e7eb}
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#3b82f6);border-radius:3px;transition:width .3s ease;width:0%}
.progress-stats{display:flex;justify-content:space-between;font-size:13px;color:#6b7280}
.progress-stats .ef{font-weight:600;color:#111827}

.fade-ind{padding:0 16px;font-size:13px;min-height:0;transition:all .2s}
.fade-ind:not(:empty){padding:8px 16px;background:#fff;border-bottom:1px solid #e5e7eb}
.fl{font-weight:600}
.fg{color:#059669}.fm{color:#d97706}.fb{color:#dc2626}.fn{color:#2563eb}

.card{background:#fff;margin:8px 12px;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);transition:border-color .2s}
.card.entered{border-left:4px solid #059669}
.card-hd{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.card-lb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff;background:#1e3a5f;padding:2px 7px;border-radius:4px}
.card-lb.sl{background:#059669}.card-lb.fl{background:#7c3aed}
.card-nm{font-size:17px;font-weight:700}
.card-st{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:12px;color:#6b7280;margin-bottom:6px}
.card-st span{white-space:nowrap}

.terrain{font-size:12px;color:#6b7280;padding:5px 8px;background:#f9fafb;border-radius:6px;border-left:3px solid #cbd5e1;margin-bottom:8px;line-height:1.4}
.cutoff-badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.cutoff-badge.ok{background:#fef3c7;color:#92400e}
.cutoff-badge.cw{background:#fed7aa;color:#9a3412}
.cutoff-badge.co{background:#fecaca;color:#991b1b}

@media(max-width:380px){.card{margin:6px 8px;padding:12px 14px}.card-nm{font-size:15px}.pt{font-size:20px}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
'use strict';

// ===== RACE DATA =====
var RS = 6; // Race start hour (06:00)
var TK = 61.4; // Total km

var CP = [
  {n:'Silverstreams',km:0,el:1757,co:null},
  {n:'Swiman',km:14.3,el:1836,co:null},
  {n:'Castleburn',km:28.2,el:1615,co:360},
  {n:'Mzimkulwana Hut',km:39.6,el:1629,co:570},
  {n:'Cobham',km:48.2,el:1635,co:null},
  {n:'Sani',km:61.4,el:1537,co:870}
];

var SG = [
  {d:14.3,up:596,dn:515,pk:2148,tc:.9,cw:.7,
   nfo:'Langalibalele Pass 4km at 9% (max 46%). Peak 2148m. Technical descent.'},
  {d:13.9,up:326,dn:534,pk:2007,tc:.9,cw:.3,
   nfo:'Black Eagle Pass 2.7km at 13% (max 47%). 3.6km descent at -9%.'},
  {d:11.4,up:489,dn:534,pk:1973,tc:1,cw:.7,
   nfo:'Hardest climbing. Umzimkhulu 0.9km at 17% (max 50%). Crane Tarn. 3.7km descent.'},
  {d:8.6,up:309,dn:302,pk:1841,tc:.5,cw:.3,
   nfo:'Shortest segment. Rolling, then Cobham Descent 2.4km at -9%.'},
  {d:13.2,up:351,dn:440,pk:1852,tc:.7,cw:.35,
   nfo:'Cobham climb 3.7km at 5%. River section. Sani Hotel Descent 1km at -18%.'}
];

// Reference profiles: elapsed minutes [Start, Swiman, Castleburn, Mzimkulwana, Cobham, Finish]
// 0-5: 2025 GCU actual race data (sportraxs), 6: 2026 race PDF back-runner estimate
var PR = [
  [0, 73, 139, 212, 266, 362],
  [0, 85, 164, 248, 311, 429],
  [0, 92, 179, 280, 357, 490],
  [0,105, 196, 301, 379, 524],
  [0,123, 223, 332, 419, 577],
  [0,133, 267, 420, 538, 740],
  [0,175, 335, 505, 660, 870]
];

var EL = [
  [0,1757.1],[.52,1753.1],[1.03,1766.3],[1.55,1818.9],[2.06,1876.2],[2.58,1963.6],
  [3.09,1990.9],[3.61,2067.1],[4.13,2079.4],[4.64,2148.3],[5.16,2137.1],[5.67,2112.3],
  [6.19,2083.8],[6.7,2078.7],[7.22,2061.7],[7.74,1978.1],[8.25,1927.7],[8.77,1892.9],
  [9.28,1823.9],[9.8,1856.4],[10.31,1937.4],[10.83,1928.4],[11.34,1924.1],[11.86,1903.5],
  [12.38,1873.9],[12.89,1859.8],[13.41,1847.1],[13.92,1839.8],[14.44,1837.2],[14.95,1845.4],
  [15.47,1849.7],[15.99,1861.6],[16.5,1870.4],[17.02,1871.8],[17.53,1882.5],[18.05,1937.3],
  [18.56,1983.5],[19.08,1976.7],[19.6,1989.3],[20.11,1980.5],[20.63,1989.6],[21.14,2003.6],
  [21.66,1999.9],[22.17,1990.1],[22.69,1976.4],[23.21,1986.2],[23.72,2003.5],[24.24,1956.4],
  [24.75,1862.9],[25.27,1806],[25.78,1725.5],[26.3,1664.8],[26.82,1637.1],[27.33,1643.9],
  [27.85,1683.8],[28.36,1616.7],[28.88,1619.6],[29.39,1622],[29.91,1647.1],[30.42,1665.4],
  [30.94,1640.1],[31.46,1721.2],[31.97,1776.6],[32.49,1771.5],[33,1750.9],[33.52,1760.3],
  [34.03,1800.9],[34.55,1832],[35.07,1898],[35.58,1961.6],[36.1,1930.3],[36.61,1877.4],
  [37.13,1844.6],[37.64,1765.6],[38.16,1714.9],[38.68,1698.6],[39.19,1652.6],[39.71,1630.2],
  [40.22,1681.2],[40.74,1733],[41.25,1785.6],[41.77,1793.3],[42.29,1785.2],[42.8,1812.3],
  [43.32,1829],[43.83,1831.5],[44.35,1815.1],[44.86,1815.1],[45.38,1830.6],[45.9,1835.7],
  [46.41,1765.5],[46.93,1726.6],[47.44,1657.9],[47.96,1624.2],[48.47,1626.5],[48.99,1618.9],
  [49.5,1629.5],[50.02,1644.9],[50.54,1660.9],[51.05,1680],[51.57,1730.3],[52.08,1756.7],
  [52.6,1813.3],[53.11,1829.4],[53.63,1836.3],[54.15,1837.6],[54.66,1845.6],[55.18,1833],
  [55.69,1795.3],[56.21,1777],[56.72,1755.9],[57.24,1699.3],[57.76,1679.1],[58.27,1631.9],
  [58.79,1583.8],[59.3,1581.7],[59.82,1573.5],[60.33,1567.4],[60.85,1545.2],[61.37,1536.7]
];
var CEL = [0,28,55,77,93,119]; // checkpoint indices into EL

// ===== STATE =====
var S = {t:{},hr:{},mxH:null,rsH:null,mH:null,mM:null,exp:'intermediate',tmp:15,cnd:'dry'};

// ===== HELPERS =====
function fe(m){if(m==null||isNaN(m))return'--:--';var h=Math.floor(m/60),mn=Math.round(m%60);return h+':'+String(mn).padStart(2,'0')}
function fc(m){if(m==null||isNaN(m))return'--:--';var t=RS*60+Math.round(m),h=Math.floor(t/60),mn=t%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0')}

// ===== PREDICTION ENGINE =====
function interp(ci,el){
  var n=PR.length,lo=0,hi=1;
  if(el<=PR[0][ci]){lo=0;hi=1}
  else if(el>=PR[n-1][ci]){lo=n-2;hi=n-1}
  else{for(var i=0;i<n-1;i++){if(el>=PR[i][ci]&&el<=PR[i+1][ci]){lo=i;hi=i+1;break}}}
  var rng=PR[hi][ci]-PR[lo][ci],a=rng>0?(el-PR[lo][ci])/rng:0;
  var r=[];for(var f=0;f<CP.length;f++)r[f]=PR[lo][f]+a*(PR[hi][f]-PR[lo][f]);
  return r;
}

function getEnt(){
  var keys=Object.keys(S.t).map(Number).sort(function(a,b){return a-b});
  return keys.map(function(k){return{cp:k,min:S.t[k],hr:S.hr[k]||null}});
}

function calcFade(ent){
  if(ent.length<2)return 0;
  var preds=ent.map(function(e){return{el:e.min,fin:interp(e.cp,e.min)[CP.length-1]}});
  var f=preds[0],l=preds[preds.length-1],hrs=(l.el-f.el)/60;
  if(hrs<=0)return 0;
  return((l.fin-f.fin)/hrs)*0.5;
}

function hrMod(fade,ent){
  if(!S.mxH)return fade;
  var last=ent[ent.length-1];if(!last.hr)return fade;
  var rest=S.rsH||60,hrr=Math.min(1,Math.max(0,(last.hr-rest)/(S.mxH-rest)));
  var m=hrr>.85?2:hrr>.75?1.5:hrr>.6?1:.5;
  return fade*m;
}

function cardDrift(ent){
  var wh=ent.filter(function(e){return e.hr});
  if(wh.length<2||!S.mxH)return 0;
  var trend=(wh[wh.length-1].hr-wh[0].hr)/(wh.length-1);
  return trend>5?.3:trend>3?.15:0;
}

function tBias(ent){
  var cc=[1,3],dc=[2,4],cf=[],df=[];
  ent.forEach(function(e){
    var fin=interp(e.cp,e.min)[CP.length-1];
    if(cc.indexOf(e.cp)>=0)cf.push(fin);
    if(dc.indexOf(e.cp)>=0)df.push(fin);
  });
  if(!cf.length||!df.length)return null;
  var ac=cf.reduce(function(a,b){return a+b})/cf.length;
  var ad=df.reduce(function(a,b){return a+b})/df.length;
  return{c:ac,d:ad};
}

function wMult(si){
  var t=SG[si].tc,mod=Math.max(0,(S.tmp-15)*.015);
  if(S.cnd==='wet')mod+=.08*t;
  else if(S.cnd==='muddy')mod+=.15*t;
  return 1+mod;
}

function predict(){
  var ent=getEnt();
  if(!ent.length)return preRace();

  var last=ent[ent.length-1],base=interp(last.cp,last.min);
  var fade=calcFade(ent);fade=hrMod(fade,ent);fade+=cardDrift(ent);
  var bias=ent.length>=2?tBias(ent):null;

  var bFin=base[CP.length-1],rem=bFin-last.min;
  var totFade=rem>0?fade*(rem/60):0;

  var res={},cum=last.min;
  for(var f=last.cp+1;f<CP.length;f++){
    var sb=base[f]-base[f-1];
    if(bias){
      var sg=SG[f-1],avg=(bias.c+bias.d)/2,str=(bias.d-bias.c)/avg;
      var cw=sg.cw,dw=1-cw,ba=cw*(-str)+dw*str;
      sb*=(1+Math.max(-.03,Math.min(.03,ba)));
    }
    sb*=wMult(f-1);
    var sp=rem>0?(base[f]-base[f-1])/rem:0;
    sb+=totFade*sp;
    cum+=sb;
    res[f]={min:cum,fut:true,ent:false};
  }
  for(var f=1;f<=last.cp;f++){
    res[f]=S.t[f]!=null?{min:S.t[f],fut:false,ent:true}:{min:base[f],fut:false,ent:false};
  }
  res._f=fade;res._lc=last.cp;res._ef=res[CP.length-1]?res[CP.length-1].min:cum;
  return res;
}

function preRace(){
  var mH=S.mH,mM=S.mM;
  if(mH==null&&mM==null)return null;
  var mm=(mH||0)*60+(mM||0);if(mm<=0)return null;
  var ml={novice:1.2,intermediate:1,experienced:.85},mt=ml[S.exp]||1;
  var est=Math.max(300,Math.min(1000,mm*2.2*mt));
  var n=PR.length,fi=CP.length-1,lo=0,hi=1;
  if(est<=PR[0][fi]){lo=0;hi=1}
  else if(est>=PR[n-1][fi]){lo=n-2;hi=n-1}
  else{for(var i=0;i<n-1;i++){if(est>=PR[i][fi]&&est<=PR[i+1][fi]){lo=i;hi=i+1;break}}}
  var rng=PR[hi][fi]-PR[lo][fi],a=rng>0?(est-PR[lo][fi])/rng:0;
  var res={};
  for(var f=1;f<CP.length;f++){
    var p=PR[lo][f]+a*(PR[hi][f]-PR[lo][f]);
    p*=wMult(f-1);
    res[f]={min:p,fut:true,ent:false,pr:true};
  }
  res._f=null;res._lc=0;res._ef=res[CP.length-1]?res[CP.length-1].min:null;
  return res;
}

// ===== BUILD UI =====
function buildApp(){
  var $=document.getElementById('app'),h='';

  h+='<header><h1>Giant\'s Cup Uncut 2026</h1>';
  h+='<div class="sub">Pace Predictor &mdash; Saturday 25 April</div>';
  h+='<div class="sub">'+TK+'km &middot; 2071m D+ &middot; Start 06:00</div></header>';

  // Runner Profile
  h+='<details class="panel"><summary>Runner Profile</summary><div class="panel-body">';
  h+='<div class="field-row"><label>Marathon time</label>';
  h+='<input type="number" id="in-mh" inputmode="numeric" min="2" max="8" placeholder="H" class="time-h">';
  h+='<span class="colon">:</span>';
  h+='<input type="number" id="in-mm" inputmode="numeric" min="0" max="59" placeholder="MM" class="time-m"></div>';
  h+='<div class="field-row"><label>Trail exp.</label><div class="btn-group" id="eg">';
  h+='<button data-v="novice">Novice</button><button data-v="intermediate" class="active">Intermediate</button><button data-v="experienced">Experienced</button>';
  h+='</div></div>';
  h+='<div class="field-row"><label>Max HR</label><input type="number" id="in-mxh" inputmode="numeric" min="120" max="220" placeholder="bpm" class="hr-input"></div>';
  h+='<div class="field-row"><label>Resting HR</label><input type="number" id="in-rsh" inputmode="numeric" min="30" max="100" placeholder="bpm" class="hr-input"></div>';
  h+='</div></details>';

  // Conditions
  h+='<details class="panel"><summary>Conditions</summary><div class="panel-body">';
  h+='<div class="field-row"><label>Temperature</label>';
  h+='<button class="temp-btn" id="td">&minus;</button><span id="tv">15&deg;C</span><button class="temp-btn" id="tu">+</button></div>';
  h+='<div class="field-row"><label>Trail</label><div class="btn-group" id="cg">';
  h+='<button data-v="dry" class="active">Dry</button><button data-v="wet">Wet</button><button data-v="muddy">Muddy</button>';
  h+='</div></div></div></details>';

  // Elevation
  h+='<div class="elevation-wrap"><svg id="es" viewBox="0 0 360 100" preserveAspectRatio="none"></svg></div>';

  // Progress
  h+='<div class="progress-section"><div class="progress-bar"><div class="progress-fill" id="pb"></div></div>';
  h+='<div class="progress-stats"><span id="pd"></span><span id="pf" class="ef"></span></div></div>';

  // Fade
  h+='<div class="fade-ind" id="fi"></div>';

  // Cards
  for(var i=0;i<CP.length;i++){
    var c=CP[i],iS=i===0,iF=i===CP.length-1,sg=i>0?SG[i-1]:null;
    var lb=iS?'START':iF?'FINISH':'AID '+i;
    var lc=iS?' sl':iF?' fl':'';
    h+='<div class="card" id="c'+i+'">';
    h+='<div class="card-hd"><span class="card-lb'+lc+'">'+lb+'</span><span class="card-nm">'+c.n+'</span></div>';
    h+='<div class="card-st"><span>'+c.km+' km</span>';
    if(sg)h+='<span>+'+sg.up+'m / -'+sg.dn+'m</span>';
    h+='<span>'+c.el+'m</span>';
    if(sg&&sg.pk>c.el+100)h+='<span>Peak '+sg.pk+'m</span>';
    h+='</div>';
    if(sg)h+='<div class="terrain">'+sg.nfo+'</div>';
    if(c.co)h+='<div class="cutoff-badge ok" id="cb'+i+'">CUTOFF '+fc(c.co)+' ('+fe(c.co)+')</div>';
    if(iS){h+='<div class="start-time">06:00</div>';}
    else{
      h+='<div class="ig"><span class="lb">Elapsed</span>';
      h+='<input type="number" id="th'+i+'" inputmode="numeric" min="0" max="23" placeholder="H" class="time-h" data-cp="'+i+'" data-f="h">';
      h+='<span class="colon">:</span>';
      h+='<input type="number" id="tm'+i+'" inputmode="numeric" min="0" max="59" placeholder="MM" class="time-m" data-cp="'+i+'" data-f="m">';
      h+='<span class="ar">&rarr;</span><span class="ck" id="ck'+i+'"></span></div>';
      h+='<div class="ig"><span class="lb">HR</span>';
      h+='<input type="number" id="hr'+i+'" inputmode="numeric" min="40" max="220" placeholder="bpm" class="hr-input" data-cp="'+i+'"></div>';
    }
    h+='<div class="pa" id="p'+i+'"></div></div>';
  }

  h+='<div class="reset-wrap"><button class="reset-btn" id="rb">Reset All</button></div>';
  $.innerHTML=h;

  drawElev();
  attachEv();
  refresh();
}

// ===== ELEVATION CHART =====
function drawElev(){
  var svg=document.getElementById('es');
  var W=360,H=100,pt=8,pb=18,pl=4,pr=4,pw=W-pl-pr,ph=H-pt-pb;
  var mn=1520,mx=2170;
  function x(d){return pl+(d/TK)*pw}
  function y(e){return pt+ph-((e-mn)/(mx-mn))*ph}

  var pts=EL.map(function(p){return x(p[0]).toFixed(1)+','+y(p[1]).toFixed(1)});
  var fill=pts.concat([x(TK).toFixed(1)+','+(H-pb),x(0).toFixed(1)+','+(H-pb)]);

  var s='<defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">';
  s+='<stop offset="0%" stop-color="#3b82f6" stop-opacity=".25"/>';
  s+='<stop offset="100%" stop-color="#3b82f6" stop-opacity=".03"/></linearGradient></defs>';
  s+='<polygon points="'+fill.join(' ')+'" fill="url(#eg)"/>';
  s+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="#3b82f6" stroke-width="1.5"/>';

  var labels=['S','1','2','3','4','F'];
  for(var i=0;i<CP.length;i++){
    var cx=x(CP[i].km),cy=y(EL[CEL[i]][1]);
    s+='<line x1="'+cx+'" y1="'+pt+'" x2="'+cx+'" y2="'+(H-pb)+'" stroke="#94a3b8" stroke-width=".5" stroke-dasharray="2,2"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="2.5" fill="#1e3a5f"/>';
    s+='<text x="'+cx+'" y="'+(H-4)+'" text-anchor="middle" font-size="10" font-family="system-ui" fill="#6b7280">'+labels[i]+'</text>';
  }
  svg.innerHTML=s;
}

// ===== REFRESH =====
function refresh(){
  var res=predict(),ent=getEnt();
  var lc=ent.length?ent[ent.length-1].cp:0;

  // Progress
  var pct=(CP[lc].km/TK*100).toFixed(0);
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('pd').textContent=CP[lc].km+' km ('+pct+'%)';
  var ef=res?res._ef:null;
  document.getElementById('pf').textContent=ef?'Est. finish: '+fc(ef)+' ('+fe(ef)+')':'Awaiting split times';

  // Fade
  var fi=document.getElementById('fi');
  if(res&&res._f!=null&&ent.length>=2){
    var f=res._f,cls,txt;
    if(f<-1){cls='fn';txt='Negative splitting (gaining speed)'}
    else if(f<=1){cls='fg';txt='Pacing well \u2014 holding steady'}
    else if(f<=3){cls='fm';txt='Mild fade detected ('+f.toFixed(1)+' min/hr)'}
    else{cls='fb';txt='Significant fade ('+f.toFixed(1)+' min/hr)'}
    fi.innerHTML='<span class="fl '+cls+'">'+txt+'</span>';
  }else fi.innerHTML='';

  // Cards
  for(var i=1;i<CP.length;i++){
    var pe=document.getElementById('p'+i);
    var card=document.getElementById('c'+i);
    var cke=document.getElementById('ck'+i);

    if(S.t[i]!=null){cke.textContent=fc(S.t[i]);card.classList.add('entered')}
    else{cke.textContent='';card.classList.remove('entered')}

    if(!res||!res[i]){
      var fast=PR[0][i],slow=PR[PR.length-1][i];
      pe.innerHTML='<div class="range-text">Range: '+fe(fast)+' \u2013 '+fe(slow)+' ('+fc(fast)+' \u2013 '+fc(slow)+')</div>';
      // Reset cutoff badge
      var bd=document.getElementById('cb'+i);if(bd)bd.className='cutoff-badge ok';
      continue;
    }

    var r=res[i];
    if(r.ent){
      pe.innerHTML='<div class="pr"><span class="pt pe">'+fe(r.min)+'</span><span class="pc">'+fc(r.min)+'</span></div>';
    }else if(r.fut){
      var co=CP[i].co,cls=r.pr?'pp':'',ch='';
      if(co){
        var buf=co-r.min;
        if(buf<0){cls='po';ch='<div class="px xo">Over cutoff by '+Math.abs(Math.round(buf))+' min</div>'}
        else if(buf<30){if(!cls)cls='pw';ch='<div class="px xw">'+Math.round(buf)+' min buffer to cutoff</div>'}
        var bd=document.getElementById('cb'+i);
        if(bd)bd.className='cutoff-badge '+(buf<0?'co':buf<30?'cw':'ok');
      }
      var lbl=r.pr?'Pre-race estimate':'Projected';
      pe.innerHTML='<div class="pr"><span class="pt '+cls+'">'+fe(r.min)+'</span><span class="pc">'+fc(r.min)+'</span></div><div class="pn">'+lbl+'</div>'+ch;
    }else{
      pe.innerHTML='<div class="pr"><span class="pt" style="color:#9ca3af;font-size:18px">'+fe(r.min)+'</span><span class="pc">'+fc(r.min)+'</span></div><div class="pn">Estimated (no split entered)</div>';
    }
  }
  document.getElementById('p0').innerHTML='';
}

// ===== EVENTS =====
function attachEv(){
  // Checkpoint time inputs
  var tInputs=document.querySelectorAll('input.time-h[data-cp],input.time-m[data-cp]');
  for(var j=0;j<tInputs.length;j++){
    tInputs[j].addEventListener('input',function(){
      var ci=Number(this.dataset.cp);
      var hv=document.getElementById('th'+ci).value.trim();
      var mv=document.getElementById('tm'+ci).value.trim();
      if(hv!==''||mv!==''){
        var h=hv!==''?parseInt(hv):0,m=mv!==''?parseInt(mv):0,tot=h*60+m;
        if(tot>0)S.t[ci]=tot;else delete S.t[ci];
      }else delete S.t[ci];
      refresh();
    });
  }

  // HR inputs
  var hrInputs=document.querySelectorAll('input.hr-input[data-cp]');
  for(var j=0;j<hrInputs.length;j++){
    hrInputs[j].addEventListener('input',function(){
      var ci=Number(this.dataset.cp),v=this.value.trim();
      if(v!=='')S.hr[ci]=parseInt(v);else delete S.hr[ci];
      refresh();
    });
  }

  // Marathon
  document.getElementById('in-mh').addEventListener('input',function(){S.mH=this.value!==''?parseInt(this.value):null;refresh()});
  document.getElementById('in-mm').addEventListener('input',function(){S.mM=this.value!==''?parseInt(this.value):null;refresh()});

  // Max/Rest HR
  document.getElementById('in-mxh').addEventListener('input',function(){S.mxH=this.value!==''?parseInt(this.value):null;refresh()});
  document.getElementById('in-rsh').addEventListener('input',function(){S.rsH=this.value!==''?parseInt(this.value):null;refresh()});

  // Experience
  document.getElementById('eg').addEventListener('click',function(e){
    if(!e.target.dataset.v)return;S.exp=e.target.dataset.v;
    var btns=this.querySelectorAll('button');
    for(var k=0;k<btns.length;k++)btns[k].classList.toggle('active',btns[k].dataset.v===S.exp);
    refresh();
  });

  // Conditions
  document.getElementById('cg').addEventListener('click',function(e){
    if(!e.target.dataset.v)return;S.cnd=e.target.dataset.v;
    var btns=this.querySelectorAll('button');
    for(var k=0;k<btns.length;k++)btns[k].classList.toggle('active',btns[k].dataset.v===S.cnd);
    refresh();
  });

  // Temperature
  document.getElementById('tu').addEventListener('click',function(){S.tmp=Math.min(45,S.tmp+1);document.getElementById('tv').innerHTML=S.tmp+'&deg;C';refresh()});
  document.getElementById('td').addEventListener('click',function(){S.tmp=Math.max(-5,S.tmp-1);document.getElementById('tv').innerHTML=S.tmp+'&deg;C';refresh()});

  // Reset
  document.getElementById('rb').addEventListener('click',function(){
    S.t={};S.hr={};S.mxH=null;S.rsH=null;S.mH=null;S.mM=null;S.exp='intermediate';S.tmp=15;S.cnd='dry';
    var inputs=document.querySelectorAll('input');for(var k=0;k<inputs.length;k++)inputs[k].value='';
    var eb=document.querySelectorAll('#eg button');for(var k=0;k<eb.length;k++)eb[k].classList.toggle('active',eb[k].dataset.v==='intermediate');
    var cb=document.querySelectorAll('#cg button');for(var k=0;k<cb.length;k++)cb[k].classList.toggle('active',cb[k].dataset.v==='dry');
    document.getElementById('tv').innerHTML='15&deg;C';
    refresh();
  });
}

// ===== INIT =====
buildApp();
</script>
